name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, mbstring, xml, simplexml, intl, sockets, bcmath, gd, soap, zip, tokenizer
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Add Magento Composer repository
        run: composer config repositories.magento composer https://repo.magento.com/

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        env:
          COMPOSER_AUTH: >-
            {"http-basic":{"repo.magento.com":{"username":"${{ secrets.MAGENTO_PUBLIC_KEY }}","password":"${{ secrets.MAGENTO_PRIVATE_KEY }}"}}}
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Coding standard (PHPCS)
        run: vendor/bin/phpcs --standard=phpcs.xml --report=full

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress --error-format=github --memory-limit=1G

      - name: Unit tests
        run: vendor/bin/phpunit --testsuite Unit